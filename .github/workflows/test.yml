name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --all-extras
        uv pip install pytest-cov pytest-xdist

    - name: Set up test environment
      run: |
        echo "DATABRICKS_HOST=https://test.cloud.databricks.com" >> $GITHUB_ENV
        echo "DATABRICKS_TOKEN=test-token" >> $GITHUB_ENV
        echo "TESTING=true" >> $GITHUB_ENV

    - name: Run linting
      run: |
        uv run ruff check server/ dba_mcp_proxy/ tests/
        uv run ruff format --check server/ dba_mcp_proxy/ tests/

    - name: Run type checking
      run: |
        uv run ty check server/ dba_mcp_proxy/

    - name: Run unit tests
      run: |
        uv run pytest tests/unit/ -v --cov=server --cov=dba_mcp_proxy --cov-report=xml --cov-report=term-missing -n auto

    - name: Run integration tests
      run: |
        uv run pytest tests/integration/ -v -m "not slow" -n auto

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-slow:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Set up test environment
      run: |
        echo "DATABRICKS_HOST=https://test.cloud.databricks.com" >> $GITHUB_ENV
        echo "DATABRICKS_TOKEN=test-token" >> $GITHUB_ENV
        echo "TESTING=true" >> $GITHUB_ENV

    - name: Run slow integration tests
      run: |
        uv run pytest tests/integration/ -v -m "slow" --tb=short

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --all-extras
        uv pip install bandit[toml] safety

    - name: Run security checks with bandit
      run: |
        uv run bandit -r server/ dba_mcp_proxy/ -f json -o bandit-report.json || true

    - name: Run dependency security check
      run: |
        uv run safety check --json --output safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install frontend dependencies
      run: |
        cd client
        bun install

    - name: Run frontend linting
      run: |
        cd client
        bun run lint

    - name: Run frontend type checking
      run: |
        cd client
        bun run type-check

    - name: Build frontend
      run: |
        cd client
        bun run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: client/build/